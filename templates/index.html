<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PasteBin</title>
<style>
@font-face{font-family:'HarmonyOS';src:url('/assets/fonts/HarmonyOS_Sans_Regular.ttf')format('truetype')}
body{font-family:'HarmonyOS',sans-serif;margin:20px;background:#f5f5f5}
.container{max-width:800px;margin:0 auto}
textarea{width:100%;height:60vh;padding:15px;font-size:16px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;resize:vertical}
h2{color:#333}
.status{font-size:14px;color:#666;margin-bottom:10px}
.btn-copy{padding:6px 14px;font-size:14px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;margin-bottom:8px}
.btn-copy:hover{background:#e8e8e8}
.btn-copy:active{background:#d0d0d0}
</style>
</head>
<body>
<div class=container>
<h2>📋 PasteBin</h2>
<div class=status id=status>Connecting...</div>
<button class=btn-copy id=btnCopy onclick="copyText()">📋 Copy</button>
<textarea id=pad placeholder="Type or paste something. All devices stay in sync.">__INITIAL_TEXT__</textarea>
</div>
<script>
const ta=document.getElementById('pad'),st=document.getElementById('status'),btn=document.getElementById('btnCopy')
function copyText(){navigator.clipboard.writeText(ta.value).then(()=>{const t=btn.innerText;btn.innerText='✅ Copied';setTimeout(()=>btn.innerText=t,1500)})}
const wsProto=location.protocol==='https:'?'wss://':'ws://'
let ws
function connect(){
ws=new WebSocket(wsProto+location.host+'/ws')
ws.onopen=()=>{st.innerText='🟢 Connected (live sync)';st.style.color='green'}
ws.onmessage=e=>{const s=ta.selectionStart,end=ta.selectionEnd;ta.value=e.data;ta.setSelectionRange(s,end)}
ws.onclose=()=>{st.innerText='🔴 Disconnected, retrying in 3s...';st.style.color='red';setTimeout(connect,3000)}
}
ta.addEventListener('input',()=>{if(ws&&ws.readyState===WebSocket.OPEN)ws.send(ta.value)})
connect()
</script>
</body>
</html>
